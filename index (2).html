/* Derive effective status for an item */
function eSt(item){
  if(item.md){
    var allComp=item.md.every(function(m){return m.st==="complete"});
    if(allComp) return "complete";
    var anyOver=item.md.some(function(m){return m.st!=="complete"&&daysBtw(m.due)<0});
    if(anyOver) return "overdue";
    var anyProg=item.md.some(function(m){return m.st==="complete"||m.st==="in-progress"});
    if(anyProg) return "in-progress";
    return "not-started";
  }
  return item.st==="complete"?"complete":daysBtw(item.due)<0?"overdue":item.st;
}

function currentDue(item){
  if(!item.md) return item.due;
  var next=item.md.find(function(m){return m.st!=="complete"});
  return next?next.due:item.md[item.md.length-1].due;
}
function currentLabel(item){
  if(!item.md) return null;
  var next=item.md.find(function(m){return m.st!=="complete"});
  return next?next.label:null;
}

/* Date display under due date column */
function dueDateDisplay(item){
  var es=eSt(item);
  if(es==="complete") return {text:"Complete",color:"#16A34A"};
  var d=currentDue(item);
  if(!d) return {text:"",color:"#6B7280"};
  var dd=daysBtw(d);
  if(dd<-90) return {text:">3 months overdue",color:"#DC2626",bold:true};
  if(dd<0) return {text:Math.abs(dd)+"d overdue",color:"#DC2626",bold:true};
  var tc=tCat(d);
  return {text:dd+"d remaining",color:tc==="lt3"?"#D97706":"#6B7280",bold:false};
}

function loadLS(k,fb){try{var v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch(e){return fb}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

function App(){
  var initData=function(){
    var saved=loadLS("gbca-rap-v3",null);
    if(saved){return D.map(function(item){
      var f=saved.find(function(x){return x.id===item.id});
      if(!f) return item;
      var out=Object.assign({},item,{st:f.st||item.st,n:f.n!=null?f.n:item.n,cd:f.cd||item.cd,nm:f.nm!=null?f.nm:item.nm,docs:f.docs||[]});
      if(f.md&&item.md){out.md=item.md.map(function(m,i){return Object.assign({},m,{st:f.md[i]?f.md[i].st:m.st})})}
      return out;
    })}
    return D;
  };

  var[data,setData]=useState(initData);
  var[fSect,setFSect]=useState("All");
  var[fRole,setFRole]=useState("All");
  var[fTime,setFTime]=useState("all");
  var[fStat,setFStat]=useState("all");
  var[search,setSearch]=useState("");
  var[expanded,setExpanded]=useState(null);
  var[editId,setEditId]=useState(null);
  var[editField,setEditField]=useState("");
  var[tmpVal,setTmpVal]=useState("");
  var[showSt,setShowSt]=useState(true);
  var[lastUp,setLastUp]=useState(function(){return loadLS("gbca-rap-v3-ts",null)});
  var[docInput,setDocInput]=useState({name:"",url:""});
  var tRef=useRef(null);

  function persist(nd){
    var ts=new Date().toLocaleString("en-AU",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
    setLastUp(ts);
    saveLS("gbca-rap-v3",nd.map(function(x){return{id:x.id,st:x.st,n:x.n,cd:x.cd,nm:x.nm,docs:x.docs,md:x.md?x.md.map(function(m){return{st:m.st}}):undefined}}));
    saveLS("gbca-rap-v3-ts",ts);
  }

  function updateStatus(id,ns){
    var nd=data.map(function(x){
      if(x.id!==id) return x;
      var cd=x.cd;
      if(ns==="complete"&&x.st!=="complete"){cd=new Date().toISOString().split("T")[0]}
      else if(ns!=="complete"){cd=""}
      return Object.assign({},x,{st:ns,cd:cd});
    });
    setData(nd);persist(nd);
  }

  function updateMdStatus(id,idx,ns){
    var nd=data.map(function(x){
      if(x.id!==id||!x.md) return x;
      var newMd=x.md.map(function(m,i){return i===idx?Object.assign({},m,{st:ns}):m});
      return Object.assign({},x,{md:newMd});
    });
    setData(nd);persist(nd);
  }

  function saveField(id,field){
    var val=tRef.current?tRef.current.value:tmpVal;
    var nd=data.map(function(x){
      if(x.id!==id) return x;
      var upd={};upd[field]=val;
      return Object.assign({},x,upd);
    });
    setData(nd);persist(nd);setEditId(null);setEditField("");
  }

  function addDoc(id){
    if(!docInput.name&&!docInput.url) return;
    var nd=data.map(function(x){
      if(x.id!==id) return x;
      return Object.assign({},x,{docs:(x.docs||[]).concat([{name:docInput.name||docInput.url,url:docInput.url}])});
    });
    setData(nd);persist(nd);setDocInput({name:"",url:""});
  }

  function removeDoc(id,di){
    var nd=data.map(function(x){
      if(x.id!==id) return x;
      return Object.assign({},x,{docs:x.docs.filter(function(_,i){return i!==di})});
    });
    setData(nd);persist(nd);
  }

  var fil=data.filter(function(item){
    if(fSect!=="All"&&item.s!==fSect) return false;
    if(fRole!=="All"&&item.r!==fRole) return false;
    if(fTime!=="all"){var cd2=currentDue(item);if(cd2){var tc2=tCat(cd2);if(fTime!==tc2) return false}else return false}
    if(fStat!=="all"&&eSt(item)!==fStat) return false;
    if(search){var q=search.toLowerCase();return item.d.toLowerCase().includes(q)||item.a.toLowerCase().includes(q)||item.n.toLowerCase().includes(q)}
    return true;
  });

  var stats={total:data.length,comp:data.filter(function(x){return eSt(x)==="complete"}).length,prog:data.filter(function(x){return eSt(x)==="in-progress"}).length,over:data.filter(function(x){return eSt(x)==="overdue"}).length,notS:data.filter(function(x){return eSt(x)==="not-started"}).length};
  var pct=Math.round((stats.comp/stats.total)*100);

  var ls={fontSize:11,fontWeight:600,color:"#6B7280",textTransform:"uppercase",letterSpacing:0.5,display:"block",marginBottom:4};
  var ss={width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #D1D5DB",fontSize:13,fontFamily:"Roboto,sans-serif",background:"#fff",color:"#1F2937",outline:"none",boxSizing:"border-box"};
  var dl={fontSize:11,fontWeight:700,color:"#44883E",textTransform:"uppercase",letterSpacing:0.5,marginBottom:4};
  var dv={fontSize:13,color:"#374151",lineHeight:1.5};

  function renderEditableField(item,field,label){

            h("span",null,"\u{1F7E2} Complete"),h("span",null,"\u{1F7E1} In Progress"),h("span",null,"\u{1F534} Overdue"),h("span",null,"\u26AA Not Started")
          )

    /* FILTERS */
    h("div",{style:{background:"#fff",borderBottom:"1px solid #E5E7EB",padding:"16px 24px"}},
      h("div",{style:{maxWidth:1200,margin:"0 auto"}},
        h("div",{style:{fontSize:13,fontWeight:600,color:"#44883E",marginBottom:12}},"\u{1F50D} Filters"),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:12}},
          h("div",null,h("label",{style:ls},"Pillar"),h("select",{value:fSect,onChange:function(e){setFSect(e.target.value)},style:ss},SECTS.map(function(x){return h("option",{key:x,value:x},x==="All"?"All Pillars":x)}))),
          h("div",null,h("label",{style:ls},"Responsibility"),h("select",{value:fRole,onChange:function(e){setFRole(e.target.value)},style:ss},ROLES.map(function(x){return h("option",{key:x,value:x},x==="All"?"All Roles":x)}))),
          h("div",null,h("label",{style:ls},"Timeline"),h("select",{value:fTime,onChange:function(e){setFTime(e.target.value)},style:ss},h("option",{value:"all"},"All Dates"),h("option",{value:"overdue"},"Overdue"),h("option",{value:"lt3"},"Within 3 months"),h("option",{value:"3to6"},"3-6 months"),h("option",{value:"gt6"},"6+ months"))),
          h("div",null,h("label",{style:ls},"Status"),h("select",{value:fStat,onChange:function(e){setFStat(e.target.value)},style:ss},h("option",{value:"all"},"All Statuses"),h("option",{value:"not-started"},"Not Started"),h("option",{value:"in-progress"},"In Progress"),h("option",{value:"complete"},"Complete"),h("option",{value:"overdue"},"Overdue"))),
          h("div",null,h("label",{style:ls},"Search"),h("input",{type:"text",placeholder:"Search deliverables...",value:search,onChange:function(e){setSearch(e.target.value)},style:Object.assign({},ss,{cursor:"text"})}))
        ),
        h("div",{style:{marginTop:10,fontSize:12,color:"#6B7280"}},"Showing "+fil.length+" of "+data.length+" deliverables")
      )
    ),
    /* TABLE */
    h("div",{style:{maxWidth:1200,margin:"0 auto",padding:"20px 24px 60px"}},
      SECTS.filter(function(x){return x!=="All"}).map(function(sect){
        var items=fil.filter(function(x){return x.s===sect});
        if(!items.length) return null;
        return h("div",{key:sect,style:{marginBottom:28}},
          h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:12}},
            h("span",{style:{fontSize:22}},ICONS[sect]),
            h("h2",{style:{fontSize:20,fontWeight:700,color:"#44883E",margin:0}},sect),
            h("span",{style:{fontSize:12,background:"#F0FDF4",color:"#44883E",padding:"2px 10px",borderRadius:20,fontWeight:600}},items.filter(function(x){return eSt(x)==="complete"}).length+"/"+items.length+" complete")
          ),
          h("div",{style:{background:"#fff",borderRadius:12,border:"1px solid #E5E7EB",overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}},
            h("div",{style:{display:"grid",gridTemplateColumns:"52px 1fr 180px 120px 100px",background:"#F9FAFB",padding:"10px 16px",fontSize:11,fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:0.5,borderBottom:"1px solid #E5E7EB"}},
              h("div",null,"#"),h("div",null,"Deliverable"),h("div",null,"Responsibility"),h("div",null,"Due Date"),h("div",null,"Status")
            ),
            items.map(function(item,idx){
              var es2=eSt(item);
              var sc=ST_CFG[es2];
              var isE=expanded===item.id;
              var ddDisp=dueDateDisplay(item);
              var cd2=currentDue(item);
              var cl=currentLabel(item);
              return h("div",{key:item.id},
                /* Main row */
                h("div",{onClick:function(){setExpanded(isE?null:item.id)},
                  style:{display:"grid",gridTemplateColumns:"52px 1fr 180px 120px 100px",padding:"12px 16px",fontSize:13,cursor:"pointer",borderBottom:"1px solid #F3F4F6",background:isE?"#FAFFFE":idx%2===0?"#fff":"#FCFCFC",alignItems:"center",borderLeft:"4px solid "+sc.c,transition:"background 0.15s"},
                  onMouseEnter:function(e){e.currentTarget.style.background="#F5FFF4"},
                  onMouseLeave:function(e){e.currentTarget.style.background=isE?"#FAFFFE":idx%2===0?"#fff":"#FCFCFC"}},
                  h("div",{style:{fontWeight:600,color:"#005687",fontSize:12}},item.id),
                  h("div",{style:{paddingRight:12}},
                    h("div",{style:{fontWeight:500,lineHeight:1.4,color:"#1F2937"}},item.d),
                    h("div",{style:{fontSize:11,color:"#9CA3AF",marginTop:2}},item.a.substring(0,80)+"..."),
                    item.md&&h("div",{style:{display:"flex",gap:3,marginTop:4}},item.md.map(function(m,i){return h("div",{key:i,title:m.label,style:{width:10,height:10,borderRadius:"50%",background:m.st==="complete"?"#16A34A":daysBtw(m.due)<0?"#EF4444":"#E5E7EB",border:"1px solid #fff"}})}))
                  ),
                  h("div",{style:{fontSize:12,color:"#4B5563"}},item.r),
                  h("div",null,
                    cd2&&h("div",{style:{fontSize:12,fontWeight:500}},fmtD(cd2)),
                    cl&&h("div",{style:{fontSize:10,color:"#9CA3AF"}},cl),
                    h("div",{style:{fontSize:10,marginTop:2,color:ddDisp.color,fontWeight:ddDisp.bold?700:400}},ddDisp.text)
                  ),

                ),
                /* Expanded */
                isE&&h("div",{style:{padding:"16px 20px 20px",background:"#FAFFFE",borderBottom:"2px solid #44883E22"}},
                  h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}},
                    h("div",null,h("div",{style:dl},"Action"),h("div",{style:dv},item.a)),
                    h("div",null,h("div",{style:dl},"Responsibility"),h("div",{style:dv},item.r)),
                    item.cd&&h("div",null,h("div",{style:dl},"Completed On"),h("div",{style:dv},fmtD(item.cd)))
                  ),
                  /* Multi-date milestones */
                  item.md&&h("div",{style:{marginBottom:16,background:"#F9FAFB",borderRadius:10,padding:14,border:"1px solid #E5E7EB"}},
                    h("div",{style:dl},"Milestone Timeline"),
                    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8,marginTop:8}},

                        var mSc=m.st==="complete"?ST_CFG.complete:mOver?ST_CFG.overdue:ST_CFG["not-started"];
                        return h("div",{key:i,style:{padding:"8px 10px",borderRadius:8,border:"1px solid "+mSc.bd,background:mSc.bg,cursor:"pointer",textAlign:"center",transition:"all 0.15s"},
                          onClick:function(e){e.stopPropagation();updateMdStatus(item.id,i,m.st==="complete"?"not-started":"complete")}},
                          h("div",{style:{fontSize:12,fontWeight:600,color:mSc.c}},m.label),
                          h("div",{style:{fontSize:10,color:mSc.c,marginTop:2}},m.st==="complete"?"\u2713 Complete":mOver?"Overdue":"Pending"),
                          h("div",{style:{fontSize:9,color:"#9CA3AF",marginTop:2}},"Click to toggle")
                        )
                      })
                    )
                  ),
                  /* Single-item status */
                  !item.md&&h("div",{style:{marginBottom:16}},
                    h("div",{style:dl},"Update Status"),
                    h("div",{style:{display:"flex",gap:8,marginTop:4,flexWrap:"wrap"}},
                      Object.entries(ST_CFG).map(function(entry){
                        var k=entry[0];var cfg=entry[1];
                        return h("button",{key:k,onClick:function(e){e.stopPropagation();updateStatus(item.id,k)},
                          style:{padding:"6px 14px",borderRadius:20,border:"2px solid "+(item.st===k?cfg.c:"#E5E7EB"),background:item.st===k?cfg.bg:"#fff",color:item.st===k?cfg.c:"#6B7280",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}},cfg.l)
                      })
                    )
                  ),
                  /* Editable fields */
                  renderEditableField(item,"nm","Next Month Goals"),
                  renderEditableField(item,"n","Notes"),
                  /* Documents */
                  h("div",{style:{marginTop:4}},
                    h("div",{style:dl},"Documents & Links"),
